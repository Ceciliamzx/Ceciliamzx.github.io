<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Uncovered Admin</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f8fb;
      color: #18263d;
    }
    .wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100vh;
    }
    .side {
      background: #1a2b48;
      color: #fff;
      padding: 16px;
    }
    .side button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      background: #1a2b48;
      color: #fff;
      border: 1px solid #9aa8bc;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
    }
    .side button:hover {
      background: #2b446a;
    }
    .main {
      padding: 18px;
      overflow: auto;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .lang, .small-btn {
      padding: 8px 12px;
      border: 1px solid #b8c2d0;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #d8dfeb;
      border-radius: 10px;
      padding: 14px;
    }
    .card h3 {
      margin: 12px 0 0;
      font-size: 18px;
    }
    .panel {
      display: none;
      background: #fff;
      border: 1px solid #d8dfeb;
      border-radius: 10px;
      padding: 12px;
    }
    .panel.active {
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid #e5ebf4;
      padding: 8px;
      font-size: 13px;
      text-align: left;
      vertical-align: top;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #c8d2e2;
      border-radius: 8px;
      padding: 8px;
      margin: 5px 0;
      font-size: 13px;
      box-sizing: border-box;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions-cell button {
      margin-right: 8px;
    }
    .empty {
      color: #64748b;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <h2 id="adminTitle">后台管理</h2>
      <button data-tab="dashboard" data-i18n="dash">数据分析面板</button>
      <button data-tab="faq" data-i18n="faq">知识库/FAQ更新</button>
      <button data-tab="feedback" data-i18n="feedback">用户意见反馈管理</button>
      <button data-tab="users" data-i18n="users">用户管理</button>
      <button data-tab="settings" data-i18n="settings">系统基础设置</button>
    </aside>

    <main class="main">
      <div class="top">
        <h2 id="pageTitle">数据分析面板</h2>
        <button class="lang" id="langBtn">EN</button>
      </div>

      <section id="faq" class="panel active">
        <div class="row">
          <input id="qZh" placeholder="问题（中文）" />
          <input id="qEn" placeholder="Question (EN)" />
        </div>
        <div class="row">
          <textarea id="aZh" rows="5" placeholder="回答（中文）"></textarea>
          <textarea id="aEn" rows="5" placeholder="Answer (EN)"></textarea>
        </div>
        <button class="small-btn" id="saveFaq">保存FAQ</button>
        <table id="faqTable"></table>
      </section>

      <section id="feedback" class="panel">
        <table id="feedbackTable"></table>
      </section>

      <section id="users" class="panel">
        <table id="usersTable"></table>
      </section>

      <section id="settings" class="panel">
        <pre id="settingsBox"></pre>
      </section>
    </main>
  </div>

  <script>
    async function loadFaqs() {
      try {
        const faqs = await fetch('/api/faq').then(res => res.json());
        const table = document.getElementById("faqTable");

        if (!Array.isArray(faqs) || faqs.length === 0) {
          table.innerHTML = `<tr><td class="empty">暂无数据</td></tr>`;
          return;
        }

        table.innerHTML =
          "<tr><th>ID</th><th>ZH</th><th>EN</th><th>Action</th></tr>" +
          faqs.map(f => `
            <tr>
              <td>${f.id}</td>
              <td><strong>Q:</strong> ${f.question_zh || ""}<br/><strong>A:</strong> ${f.answer_zh || ""}</td>
              <td><strong>Q:</strong> ${f.question_en || ""}<br/><strong>A:</strong> ${f.answer_en || ""}</td>
              <td class="actions-cell"><button class="small-btn" onclick="delFaq(${f.id})">删除</button></td>
            </tr>
          `).join("");
      } catch (e) {
        document.getElementById("faqTable").innerHTML = `<tr><td class="empty">暂无数据</td></tr>`;
      }
    }

    document.getElementById("saveFaq").addEventListener("click", async () => {
      const payload = {
        question_zh: document.getElementById("qZh").value.trim(),
        question_en: document.getElementById("qEn").value.trim(),
        answer_zh: document.getElementById("aZh").value.trim(),
        answer_en: document.getElementById("aEn").value.trim()
      };

      if (!payload.question_zh || !payload.question_en) {
        alert("中英文问题都需要填写");
        return;
      }

      try {
        await fetch("/api/faq", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        document.getElementById("qZh").value = "";
        document.getElementById("qEn").value = "";
        document.getElementById("aZh").value = "";
        document.getElementById("aEn").value = "";

        await loadFaqs();
      } catch (e) {
        alert("FAQ 保存失败");
      }
    });

    async function delFaq(id) {
      try {
        await fetch(`/api/faq/${id}`, { method: "DELETE" });
        await loadFaqs();
      } catch (e) {
        alert("删除失败");
      }
    }

    loadFaqs();
  </script>
</body>
</html>
